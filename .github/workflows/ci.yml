name: ci

on:
  push:
    branches: [main, refactor/web-admin]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'

      - name: Build web SPA
        run: |
          cd web
          pnpm install --frozen-lockfile=false
          pnpm run build
          cd ..
          # Mirror web/build into webassets/ so the embed directive sees the bundle.
          make webassets/build

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Gofmt check
        run: |
          gofmt -l . > /tmp/gofmt.out
          test ! -s /tmp/gofmt.out || (cat /tmp/gofmt.out; exit 1)

      - name: Vet
        run: go vet ./...

      - name: pnpm audit (prod)
        working-directory: web
        run: pnpm audit --prod || true

      - name: Test
        run: go test ./...

      - name: Build binary
        run: go build -ldflags "-X github.com/Tutitoos/mcp-tools/internal/version.Version=ci" -o bin/mcp-tools ./cmd/mcp-tools

      - name: Smoke test (version + boot)
        run: |
          ./bin/mcp-tools --version
          ./bin/mcp-tools serve --port 18080 --bind 127.0.0.1 &
          PID=$!
          sleep 2
          curl -sf http://127.0.0.1:18080/api/version
          curl -sf http://127.0.0.1:18080/ | head -1
          kill $PID 2>/dev/null || true
          wait 2>/dev/null

      - name: Shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck install.sh scripts/wrappers/mem0-launcher