name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Gofmt check
        run: |
          gofmt -l . > /tmp/gofmt.out
          test ! -s /tmp/gofmt.out || (cat /tmp/gofmt.out; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck install.sh scripts/wrappers/mem0-launcher
