services:
  mcp_tools_mem0:
    build:
      context: ../mcps/mem0
      dockerfile: Dockerfile
      args:
        UID: "${HOST_UID}"
        GID: "${HOST_GID}"

    image: "${MCP_TOOLS_MEM0_IMAGE}"

    container_name: mcp-tools-mem0

    restart: unless-stopped

    network_mode: "host"

    env_file:
      - ../.env.mem0

    environment:
      HOME: /home/mcp
      UV_CACHE_DIR: /home/mcp/.cache/uv
      PYTHONUNBUFFERED: "1"
      MEM0_USER_ID: "${MEM0_USER_ID}"

    volumes:
      - "${MEM0_SRC_PATH}:/opt/mem0-src:ro"
      - "${MCP_TOOLS_DATA}/mem0/history:/data/history"
      - "${MCP_TOOLS_DATA}/mem0/uv-cache:/home/mcp/.cache/uv"
      - "${MCP_TOOLS_DATA}/mem0/config:/home/mcp/.config/mem0"
      - "${HOST_HOME}:${HOST_HOME}"

    working_dir: /opt/mem0-src

    entrypoint: ["sleep"]
    command: ["infinity"]

    depends_on:
      mcp_tools_mem0_qdrant:
        condition: service_healthy
      mcp_tools_ollama:
        condition: service_started

  mcp_tools_mem0_qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: mcp-tools-mem0-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - mem0-qdrant-storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mem0-qdrant-storage:
    name: mcp-qdrant-storage
