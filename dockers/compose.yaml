name: mcp-tools

include:
  - mem0-compose.yml

services:
  mcp_tools_codebase_memory:
    build:
      context: ../mcps/codebase-memory
      dockerfile: Dockerfile
      args:
        UID: "${HOST_UID}"
        GID: "${HOST_GID}"

    image: "${MCP_TOOLS_CODEBASE_MEMORY_IMAGE}"

    container_name: mcp-tools-codebase-memory

    restart: unless-stopped

    network_mode: "none"

    entrypoint: ["sleep"]
    command: ["infinity"]

    environment:
      HOME: /home/mcp
      RUST_LOG: warn

    volumes:
      - "${MCP_TOOLS_DATA}/codebase-memory/cache:/home/mcp/.cache/codebase-memory-mcp"
      - "${MCP_TOOLS_DATA}/codebase-memory/config:/home/mcp/.config/codebase-memory-mcp"
      - "${HOST_HOME}:${HOST_HOME}"

    working_dir: "${HOST_HOME}"

  mcp_tools_headroom:
    build:
      context: ../mcps/headroom
      dockerfile: Dockerfile
      args:
        UID: "${HOST_UID}"
        GID: "${HOST_GID}"

    image: "${MCP_TOOLS_HEADROOM_IMAGE}"

    container_name: mcp-tools-headroom

    restart: unless-stopped

    environment:
      HOME: /home/mcp
      PYTHONUNBUFFERED: "1"

    volumes:
      - "${MCP_TOOLS_DATA}/headroom/cache:/home/mcp/.cache"
      - "${MCP_TOOLS_DATA}/headroom/config:/home/mcp/.config/headroom"
      - "${MCP_TOOLS_DATA}/headroom/share:/home/mcp/.local/share/headroom"
      - "${HOST_HOME}:${HOST_HOME}"

    working_dir: "${HOST_HOME}"

    entrypoint: ["sleep"]
    command: ["infinity"]

  mcp_tools_ollama:
    image: ollama/ollama:latest
    container_name: mcp-tools-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - "${MCP_TOOLS_DATA}/ollama:/root/.ollama"
