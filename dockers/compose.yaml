name: mcp-tools

include:
  - qdrant-compose.yml

services:
  mcp_tools_ollama:
    image: ollama/ollama:0.31.1
    container_name: mcp-tools-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
    ports:
      - "${MCP_TOOLS_BIND}:11434:11434"
    volumes:
      - "${MCP_TOOLS_DATA}/ollama:/root/.ollama"
